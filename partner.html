<!DOCTYPE html>
<html lang="sr-Latn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>StayVB — Partner Panel</title>
<meta name="robots" content="noindex,nofollow">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="security-guard.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
*{box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(180deg,#020617,#0f172a);color:white;min-height:100vh;margin:0}
#google_translate_element{display:none!important}
.goog-te-banner-frame,.skiptranslate{display:none!important}
body{top:0!important}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:40px}

/* Header */
.header{background:linear-gradient(135deg,rgba(251,191,36,0.12),transparent),linear-gradient(180deg,#0f172a,#111827);padding:52px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.06);position:relative}
.logout-btn{position:absolute;top:14px;right:14px;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);font-size:10px;font-weight:900;color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:0.08em}

/* PIN screen */
#pin-screen{min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
#pin-screen:not(.hidden){display:flex}
.pin-input{width:100%;max-width:260px;padding:18px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:1.5rem;color:white;font-size:1.8rem;font-weight:900;text-align:center;font-family:inherit;letter-spacing:0.3em;outline:none}
.pin-input:focus{border-color:rgba(251,191,36,0.40);background:rgba(255,255,255,0.08)}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.08);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 16px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.10em;color:rgba(255,255,255,0.4);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.18s}
.tab.active{color:#fbbf24;border-bottom-color:#fbbf24}

/* Content area */
.tab-content{display:none;padding:20px}
.tab-content.active{display:block}

/* Form elements */
.field-group{margin-bottom:16px}
.field-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.4);margin-bottom:6px;display:block}
.field-input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);border-radius:14px;color:white;font-size:13px;font-weight:700;font-family:inherit;outline:none;transition:border-color 0.18s}
.field-input:focus{border-color:rgba(251,191,36,0.40);background:rgba(255,255,255,0.08)}
.field-input::placeholder{color:rgba(255,255,255,0.25)}
textarea.field-input{resize:vertical;min-height:90px}

/* Cards */
.panel-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:1.5rem;padding:16px;margin-bottom:12px}
.panel-card-title{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.4);margin:0 0 12px}

/* Toggle switch */
.toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:12px 0}
.toggle-label{font-size:13px;font-weight:800;color:rgba(255,255,255,0.85)}
.toggle-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
.toggle{position:relative;width:48px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:rgba(255,255,255,0.12);border-radius:999px;cursor:pointer;transition:0.3s}
.toggle-slider:before{content:"";position:absolute;height:20px;width:20px;left:3px;top:3px;background:white;border-radius:50%;transition:0.3s}
.toggle input:checked + .toggle-slider{background:#10b981}
.toggle input:checked + .toggle-slider:before{transform:translateX(22px)}

/* Buttons */
.btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,#d97706,#f59e0b);color:#0f172a;border:none;border-radius:1.2rem;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:0.10em;cursor:pointer;font-family:inherit;transition:transform 0.18s;margin-top:8px}
.btn-primary:active{transform:scale(0.97)}
.btn-danger{width:100%;padding:14px;background:rgba(239,68,68,0.12);color:#fca5a5;border:1px solid rgba(239,68,68,0.25);border-radius:1.2rem;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.10em;cursor:pointer;font-family:inherit;margin-top:8px}

/* Booking table */
.booking-row{padding:12px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.booking-time{font-size:1rem;font-weight:900;color:#fbbf24;min-width:52px}
.booking-info{flex:1;font-size:12px;font-weight:700}
.booking-qty{font-size:10px;font-weight:900;color:#10b981;background:rgba(16,185,129,0.12);padding:3px 8px;border-radius:999px}
.cancel-btn{padding:6px 12px;border-radius:999px;background:rgba(239,68,68,0.12);color:#fca5a5;border:1px solid rgba(239,68,68,0.20);font-size:9px;font-weight:900;cursor:pointer;font-family:inherit;text-transform:uppercase}

/* Billing counter */
.billing-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:900}
.bc-ok{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.25);color:#6ee7b7}
.bc-warn{background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);color:#fcd34d}
.bc-full{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#fca5a5}

.save-msg{text-align:center;font-size:11px;font-weight:800;min-height:18px;color:#6ee7b7;margin-top:8px}
</style>
</head>
<body>
<div id="google_translate_element" style="display:none"></div>

<!-- PIN Screen -->
<div id="pin-screen">
  <img src="icon192.png" style="width:72px;height:72px;border-radius:22px;margin-bottom:20px;border:1px solid rgba(251,191,36,0.30)">
  <h1 style="font-size:1.5rem;font-weight:900;color:#fbbf24;margin:0 0 4px;letter-spacing:-0.03em">Partner Panel</h1>
  <p style="font-size:10px;color:rgba(255,255,255,0.35);font-weight:900;text-transform:uppercase;letter-spacing:0.18em;margin:0 0 40px">StayVB</p>
  <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6"
    id="pin-input" class="pin-input" placeholder="••••" autocomplete="off">
  <p id="pin-error" style="min-height:16px;font-size:11px;font-weight:800;color:#f87171;margin:10px 0 0"></p>
  <button onclick="doLogin()" style="margin-top:20px;width:100%;max-width:260px;padding:16px;background:linear-gradient(135deg,#d97706,#f59e0b);color:#0f172a;border:none;border-radius:1.5rem;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:0.12em">
    Prijavi se →
  </button>
</div>

<!-- Main App -->
<!-- Suspendovan nalog -->
<div id="suspended-screen" class="hidden" style="min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;background:linear-gradient(145deg,#0f172a,#1a2540)">
  <div style="font-size:3rem;margin-bottom:20px">🔒</div>
  <h2 style="font-size:1.3rem;font-weight:900;color:#f87171;margin:0 0 10px;letter-spacing:-0.02em">Nalog je suspendovan</h2>
  <p style="font-size:13px;color:rgba(255,255,255,0.55);font-weight:600;line-height:1.6;max-width:280px;margin:0 0 28px">
    Vaš nalog je privremeno deaktiviran. Kontaktirajte administratora StayVB sistema za više informacija.
  </p>
  <div style="padding:14px 20px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.20);border-radius:14px;font-size:11px;font-weight:800;color:#fca5a5;max-width:280px">
    📧 Kontakt: admin@stayvb.rs
  </div>
</div>

<style>
#suspended-screen:not(.hidden){display:flex}
</style>

<div id="main-app" class="app hidden">
  <div class="header">
    <button class="logout-btn" onclick="doLogout()">Odjavi se</button>
    <p style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:0.14em;color:rgba(255,255,255,0.35);margin:0 0 4px" id="partner-type-label">Partner</p>
    <h1 style="font-size:1.4rem;font-weight:900;margin:0;letter-spacing:-0.03em;color:white" id="partner-name-header">Partner</h1>
  </div>

  <div class="tabs" id="tabs-bar"></div>

  <div id="tabs-content"></div>
</div>

<script>
const sb = C.db();
const token = C.getPartnerToken();
let partner = null, partnerContent = null;

// ── PIN Login ─────────────────────────────────────────────────────
document.getElementById('pin-input').addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });

async function doLogin(){
  const pin = document.getElementById('pin-input').value.trim();
  const errEl = document.getElementById('pin-error');
  if(!pin){ errEl.textContent = 'Unesi PIN.'; return; }

  const result = await C.partnerLogin(token, pin);
  if(!result.ok){ errEl.textContent = result.error || 'Pogrešan PIN.'; return; }

  partner = result.partner;

  // Provjeri da li je nalog suspendovan
  if(!partner.is_active){
    document.getElementById('pin-screen').classList.add('hidden');
    document.getElementById('main-app').classList.add('hidden');
    // Prikaži suspendovan ekran
    const suspended = document.getElementById('suspended-screen');
    if(suspended) suspended.classList.remove('hidden');
    return;
  }

  document.getElementById('pin-screen').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  initApp();
}

function doLogout(){
  C.clearPartnerSession();
  location.reload();
}

// ── Init App ──────────────────────────────────────────────────────
async function initApp(){
  try {
    document.getElementById('partner-name-header').textContent = partner.name || 'Partner';
    document.getElementById('partner-type-label').textContent = getTypeLabel(partner.type);

    // Učitaj sadržaj
    const { data:pc } = await sb.from('partner_content').select('*').eq('partner_id', partner.id).maybeSingle();
    partnerContent = pc || {};

    buildTabs();
  } catch(e) {
    console.error('initApp greška:', e);
    // Ako nešto pade — vrati na PIN screen
    document.getElementById('pin-screen').classList.remove('hidden');
    document.getElementById('main-app').classList.add('hidden');
    document.getElementById('pin-error').textContent = 'Greška pri učitavanju. Pokušajte ponovo.';
  }
}

function getTypeLabel(type){
  return {apartment:'Apartman',hotel:'Hotel',restaurant:'Restoran',attraction:'Atrakcija',business:'Mali biznis'}[type] || type;
}

// ── Tabs po tipu ──────────────────────────────────────────────────
function buildTabs(){
  const type = partner.type;
  const tabs = [];

  // Apartman/Hotel - Smeštaj
  if(type === 'apartment' || type === 'hotel') tabs.push({id:'stay', label:'Smeštaj', render: renderStay});

  // Hotel i Restoran i Atrakcija - Happy Hour
  if(type === 'hotel' || type === 'restaurant' || type === 'attraction') tabs.push({id:'hh', label:'Happy Hour', render: renderHH});

  // Mali biznis - Promocije
  if(type === 'business') tabs.push({id:'promo', label:'Promocije', render: renderPromo});

  // Hotel i Atrakcija - Info za Atrakcije sekciju
  if(type === 'hotel' || type === 'attraction') tabs.push({id:'info', label:'Atrakcije Info', render: renderInfo});

  // Booking - ako je omogućeno (atrakcija može sama uključiti kroz Info tab)
  if(partner.has_booking) tabs.push({id:'bookings', label:'Rezervacije', render: renderBookings});

  // Hotel i Restoran - Događaji
  if(type === 'hotel' || type === 'restaurant') tabs.push({id:'events', label:'Događaji', render: renderEvents});

  // Svi - Statistike
  tabs.push({id:'stats', label:'Statistike', render: renderStats});

  const tabsBar = document.getElementById('tabs-bar');
  tabsBar.innerHTML = tabs.map((t,i) => `<button class="tab${i===0?' active':''}" onclick="switchTab('${t.id}',this)">${t.label}</button>`).join('');

  const tabsContent = document.getElementById('tabs-content');
  tabsContent.innerHTML = tabs.map((t,i) => `<div id="tab-${t.id}" class="tab-content${i===0?' active':''}"></div>`).join('');

  // Render prvog taba
  tabs[0].render();
  // Lazy render ostalih
  tabs.forEach((t,i) => { if(i>0) t._render = t.render; });

  window._tabs = tabs;
}

function switchTab(id, btn){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
  const tab = window._tabs?.find(t => t.id === id);
  if(tab && !document.getElementById('tab-'+id).children.length) tab.render();
}

// ── Stay Tab (apartman + hotel) ───────────────────────────────────
function renderStay(){
  const el = document.getElementById('tab-stay');
  const pc = partnerContent;
  const isPremium = partner.is_premium;
  el.innerHTML = `
    <div class="panel-card">
      <p class="panel-card-title">WiFi podaci</p>
      <div class="field-group"><label class="field-label">Naziv mreže</label><input class="field-input" id="s-wifi-name" value="${esc(pc.wifi_name||'')}"></div>
      <div class="field-group"><label class="field-label">Lozinka</label><input class="field-input" id="s-wifi-pass" value="${esc(pc.wifi_pass||'')}"></div>
    </div>
    ${isPremium ? `
    <div class="panel-card">
      <p class="panel-card-title">Posebna ponuda gostima</p>
      <div class="field-group"><textarea class="field-input" id="s-extra-offer" placeholder="npr. Besplatan doručak prvog dana...">${esc(pc.extra_offer||'')}</textarea></div>
    </div>
    <div class="panel-card">
      <p class="panel-card-title">Cenovnik usluga</p>
      <div class="field-group"><textarea class="field-input" id="s-services" placeholder="npr. Doručak 500 RSD&#10;Transfer 2000 RSD">${esc(pc.service_prices||'')}</textarea></div>
    </div>
    <div class="panel-card">
      <p class="panel-card-title">Kućni red</p>
      <div class="field-group"><textarea class="field-input" id="s-rules" placeholder="Pravila boravka...">${esc(pc.house_rules||'')}</textarea></div>
    </div>
    ${isPremium ? `
    <div class="panel-card" style="border-color:rgba(236,72,153,0.20);background:rgba(236,72,153,0.04)">
      <p class="panel-card-title" style="color:#f9a8d4">📸 Instagram Share kampanja</p>
      <div class="toggle-wrap">
        <div><div class="toggle-label">Aktivna kampanja</div><div class="toggle-sub">Gosti vide Share dugme na početnoj</div></div>
        <label class="toggle"><input type="checkbox" id="s-share-active" ${pc.share_campaign_active?'checked':''}>\n        <span class="toggle-slider"></span></label>
      </div>
      <div class="field-group"><label class="field-label">Instagram Reel URL</label><input class="field-input" id="s-reel-url" value="${esc(pc.instagram_reel_url||'')}" placeholder="https://www.instagram.com/reel/..."></div>
      <div class="field-group"><label class="field-label">Poklon opis (šta gost dobija)</label><input class="field-input" id="s-gift" value="${esc(pc.share_gift_text||'')}" placeholder="npr. čaša lokalnog vina"></div>
    </div>
    ` : `
    <div class="panel-card" style="border-color:rgba(236,72,153,0.12);background:rgba(236,72,153,0.03)">
      <p class="panel-card-title" style="color:#f9a8d4">📸 Instagram Share kampanja</p>
      <p style="font-size:12px;color:rgba(255,255,255,0.5);font-weight:600;line-height:1.5;margin:0">Dostupno samo za <strong style="color:#fbbf24">Premium partnere</strong>. Kontaktirajte administratora.</p>
    </div>
    `}` : `
    <div class="panel-card" style="border-color:rgba(251,191,36,0.20);background:rgba(251,191,36,0.05)">
      <p class="panel-card-title" style="color:#fbbf24">Upgrade na Premium</p>
      <p style="font-size:13px;color:rgba(255,255,255,0.6);font-weight:600;margin:0 0 12px;line-height:1.5">Premium plan omogućava: posebnu ponudu, cenovnik, kućni red, share kampanju i više.</p>
      <p style="font-size:12px;color:#fbbf24;font-weight:800">Kontaktiraj administratora za aktivaciju.</p>
    </div>`}
    <button class="btn-primary" onclick="saveStay()">💾 Sačuvaj izmene</button>
    <p class="save-msg" id="stay-msg"></p>`;
}

async function saveStay(){
  const updates = {
    wifi_name: document.getElementById('s-wifi-name')?.value || '',
    wifi_pass: document.getElementById('s-wifi-pass')?.value || '',
  };
  if(partner.is_premium){
    updates.extra_offer = document.getElementById('s-extra-offer')?.value || '';
    updates.service_prices = document.getElementById('s-services')?.value || '';
    updates.house_rules = document.getElementById('s-rules')?.value || '';
    updates.share_campaign_active = document.getElementById('s-share-active')?.checked || false;
    updates.instagram_reel_url = document.getElementById('s-reel-url')?.value || '';
    updates.share_gift_text = document.getElementById('s-gift')?.value || '';
    updates.updated_at = new Date().toISOString();
  }
  await sb.from('partner_content').update(updates).eq('partner_id', partner.id);
  document.getElementById('stay-msg').textContent = '✓ Sačuvano!';
  setTimeout(() => document.getElementById('stay-msg').textContent = '', 2500);
}

// ── Happy Hour Tab ────────────────────────────────────────────────
function renderHH(){
  const el = document.getElementById('tab-hh');
  const today = new Date().toISOString().split('T')[0];
  const pc = partnerContent;
  el.innerHTML = `
    <div class="panel-card">
      <div class="toggle-wrap">
        <div><div class="toggle-label">Happy Hour aktivan</div><div class="toggle-sub">Vidljiv gostima odmah</div></div>
        <label class="toggle"><input type="checkbox" id="hh-active" ${partner.hh_active?'checked':''}><span class="toggle-slider"></span></label>
      </div>
    </div>
    <div class="panel-card">
      <p class="panel-card-title">Podešavanje</p>
      <div class="field-group"><label class="field-label">Datum</label><input type="date" class="field-input" id="hh-date" value="${partner.hh_date||today}" min="${today}"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field-group"><label class="field-label">Od</label><input type="time" class="field-input" id="hh-start" value="${partner.hh_start?.slice(0,5)||'17:00'}"></div>
        <div class="field-group"><label class="field-label">Do</label><input type="time" class="field-input" id="hh-end" value="${partner.hh_end?.slice(0,5)||'19:00'}"></div>
      </div>
      <p style="font-size:10px;color:rgba(255,255,255,0.35);font-weight:700;margin:8px 0 0">⏱ Happy Hour može trajati najviše 4 sata, jednom dnevno.</p>
    </div>
    <div class="panel-card">
      <p class="panel-card-title">Opis ponude</p>
      <div class="field-group"><textarea class="field-input" id="hh-info" placeholder="Šta nudite gostima u HH?">${esc(pc.hh_info||'')}</textarea></div>
    </div>
    <button class="btn-primary" onclick="saveHH()">💾 Sačuvaj i aktiviraj</button>
    <p class="save-msg" id="hh-msg"></p>`;
}

async function saveHH(){
  const active = document.getElementById('hh-active').checked;
  const date   = document.getElementById('hh-date').value;
  const start  = document.getElementById('hh-start').value;
  const end    = document.getElementById('hh-end').value;
  const info   = document.getElementById('hh-info').value;
  const msgEl  = document.getElementById('hh-msg');

  // Validacija - max 4 sata trajanja
  if(active && start && end){
    const [sh,sm] = start.split(':').map(Number);
    const [eh,em] = end.split(':').map(Number);
    let diffMin = (eh*60+em) - (sh*60+sm);
    if(diffMin <= 0) diffMin += 24*60; // prelazak preko ponoći
    if(diffMin > 240){
      msgEl.textContent = '⚠️ Happy Hour može trajati najviše 4 sata.';
      msgEl.style.color = '#f87171';
      return;
    }
    if(diffMin <= 0){
      msgEl.textContent = '⚠️ Vreme završetka mora biti posle početka.';
      msgEl.style.color = '#f87171';
      return;
    }
  }

  await sb.from('partners').update({hh_active:active, hh_date:date, hh_start:start, hh_end:end}).eq('id', partner.id);
  await sb.from('partner_content').update({hh_info:info, updated_at: new Date().toISOString()}).eq('partner_id', partner.id);
  partner.hh_active = active;
  msgEl.style.color = '#6ee7b7';
  msgEl.textContent = '✓ Sačuvano!';
  setTimeout(() => msgEl.textContent = '', 2500);
}

// ── Promo Tab (mali biznisi) ──────────────────────────────────────
async function renderPromo(){
  const el = document.getElementById('tab-promo');
  const now = new Date();
  const monthYear = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const { data:bills } = await sb.from('billing').select('*').eq('partner_id', partner.id).eq('month_year', monthYear).eq('type','promotion');
  const usedCount = bills?.length || 0;
  const chipClass = usedCount >= 3 ? 'bc-full' : usedCount >= 2 ? 'bc-warn' : 'bc-ok';
  const pc = partnerContent;
  el.innerHTML = `
    <div class="panel-card">
      <p class="panel-card-title">Mesečni limit promocija</p>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="billing-chip ${chipClass}">${usedCount}/3 iskorišćeno</span>
        ${usedCount >= 3 ? '<span style="font-size:11px;color:#fca5a5;font-weight:700">Limit dostignut</span>' : ''}
      </div>
    </div>
    ${usedCount < 3 ? `
    <div class="panel-card">
      <p class="panel-card-title">Nova promocija</p>
      <div class="field-group"><label class="field-label">Cenovni plan</label>
        <select class="field-input" id="p-plan">
          <option value="basic">Basic — 300 RSD (1 dan)</option>
          <option value="standard">Standard — 500 RSD (3 dana)</option>
          <option value="premium">Premium — 800 RSD (7 dana)</option>
        </select>
      </div>
      <div class="field-group"><label class="field-label">Tekst promocije</label><textarea class="field-input" id="p-offer" placeholder="npr. 20% popust na sve tretmane ovog vikenda">${esc(pc.current_offer||'')}</textarea></div>
      <button class="btn-primary" onclick="activatePromo()">🚀 Aktiviraj promociju</button>
    </div>` : ''}
    <p class="save-msg" id="promo-msg"></p>`;
}

async function activatePromo(){
  const plan = document.getElementById('p-plan').value;
  const offer = document.getElementById('p-offer').value.trim();
  if(!offer){ document.getElementById('promo-msg').textContent = '⚠️ Upiši tekst promocije.'; return; }
  const prices = {basic:300, standard:500, premium:800};
  const days   = {basic:1, standard:3, premium:7};
  const now = new Date();
  const monthYear = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const expiresAt = new Date(now.getTime() + days[plan]*24*60*60*1000).toISOString();
  await sb.from('billing').insert({partner_id:partner.id, type:'promotion', plan_tier:plan, amount_rsd:prices[plan], offer_text:offer, duration_days:days[plan], month_year:monthYear, expires_at:expiresAt});
  await sb.from('partner_content').update({current_offer:offer, offer_expires_at:expiresAt, updated_at:new Date().toISOString()}).eq('partner_id', partner.id);
  document.getElementById('promo-msg').textContent = '✓ Promocija aktivirana!';
  setTimeout(() => renderPromo(), 1500);
}

// ── Info Tab (atrakcije + ostali) ─────────────────────────────────

  const pc = partnerContent;
  const typeNote = partner.type==='hotel'
    ? 'Ovi podaci se prikazuju gostima u sekciji <strong style="color:#fbbf24">Atrakcije</strong> kao informacija o vašem hotelu.'
    : 'Ovi podaci se prikazuju gostima u sekciji <strong style="color:#fbbf24">Atrakcije</strong>.';

  const bookingToggle = partner.type==='attraction' ? `
    <div class="panel-card" style="border-color:rgba(59,130,246,0.18);background:rgba(59,130,246,0.04)">

        <div>
          <div class="toggle-label" style="color:#93c5fd">Zakazivanje termina</div>
          <div class="toggle-sub">Gosti mogu rezervisati termin direktno</div>

    </div>` : '';

  el.innerHTML = `
    <div class="panel-card" style="border-color:rgba(251,191,36,0.15);background:rgba(251,191,36,0.03)">
      <p style="font-size:11px;color:rgba(255,255,255,0.55);font-weight:600;line-height:1.5;margin:0">${typeNote}</p>
    </div>
    ${bookingToggle}
    <div class="panel-card">
      <p class="panel-card-title">Opis</p>
      <div class="field-group"><label class="field-label">Kratki opis (za karticu)</label><input class="field-input" id="i-short" value="${esc(pc.short_desc||'')}" maxlength="120"></div>
      <div class="field-group"><label class="field-label">Duži opis</label><textarea class="field-input" id="i-desc">${esc(pc.description||'')}</textarea></div>
    </div>
    <div class="panel-card">
      <p class="panel-card-title">Radno vreme i kontakt</p>
      <div class="field-group"><label class="field-label">Radno vreme</label><input class="field-input" id="i-hours" value="${esc(pc.working_hours||'')}" placeholder="npr. Svaki dan 09:00–19:00"></div>
      <div class="field-group"><label class="field-label">Adresa</label><input class="field-input" id="i-addr" value="${esc(pc.address||'')}"></div>

async function toggleBooking(enabled){
  await sb.from('partners').update({has_booking:enabled}).eq('id', partner.id);
  partner.has_booking = enabled;

  if(enabled){
    // Provjeri da li već postoji bookable_resources red, ako ne - kreiraj default
    const {data:existing} = await sb.from('bookable_resources').select('id').eq('partner_id', partner.id).limit(1);
    if(!existing?.length){
      await sb.from('bookable_resources').insert({
        partner_id: partner.id,
        name: 'Termin',
        total_qty: 10,
        is_active: true
      });
    }
  }

  buildTabs(); // Rebuild tabs da se Rezervacije pojavi/sakrije

  // Vrati na info tab posle rebuild-a
  setTimeout(() => {
    const tabsBar = document.getElementById('tabs-bar');
    const btns = tabsBar?.querySelectorAll('.tab') || [];
    btns.forEach(b => {
      if(b.getAttribute('onclick')?.includes("'info'")) b.click();
    });
  }, 50);
}

async function saveInfo(){
  await sb.from('partner_content').update({
    short_desc: document.getElementById('i-short')?.value||'',
    description: document.getElementById('i-desc')?.value||'',
    working_hours: document.getElementById('i-hours')?.value||'',
    address: document.getElementById('i-addr')?.value||'',
    updated_at: new Date().toISOString()
  }).eq('partner_id', partner.id);
  document.getElementById('info-msg').textContent = '✓ Sačuvano!';
  setTimeout(() => document.getElementById('info-msg').textContent = '', 2500);
}

// ── Bookings Tab ──────────────────────────────────────────────────
async function renderBookings(){
  const el = document.getElementById('tab-bookings');
  el.innerHTML = '<p style="font-size:12px;color:rgba(255,255,255,0.4);font-weight:700">Učitavanje...</p>';

  const today = new Date().toISOString().split('T')[0];
  const { data:resources } = await sb.from('bookable_resources').select('*').eq('partner_id', partner.id).eq('is_active', true).order('sort_order');

  // Editor resursa - samo atrakcije mogu sami podesiti
  let resourceEditor = '';
  if(partner.type === 'attraction'){
    const r = resources?.[0];
    resourceEditor = `
    <div class="panel-card" style="border-color:rgba(59,130,246,0.18);background:rgba(59,130,246,0.04)">
      <p class="panel-card-title" style="color:#93c5fd">Podešavanje termina</p>
      <div class="field-group"><label class="field-label">Naziv termina</label><input class="field-input" id="res-name" value="${esc(r?.name||'Termin')}" placeholder="npr. Vožnja, Obilazak, Sto"></div>
      <div class="field-group"><label class="field-label">Kapacitet po terminu</label><input type="number" class="field-input" id="res-qty" value="${r?.total_qty||10}" min="1" max="999"></div>
      <button class="btn-primary" onclick="saveResource('${r?.id||''}')">💾 Sačuvaj podešavanje</button>
      <p class="save-msg" id="res-msg"></p>
    </div>`;
  }

  if(!resources?.length){
    el.innerHTML = resourceEditor + '<p style="font-size:13px;color:rgba(255,255,255,0.4);font-weight:700;margin-top:12px">Nemate definisane resurse za booking. Kontaktirajte administratora.</p>';
    return;
  }

  // Uzmi sve potvrđene rezervacije za danas i narednih 7 dana
  const in7 = new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0];
  const { data:bookings } = await sb.from('bookings').select('*').in('resource_id', resources.map(r=>r.id)).gte('booking_date', today).lte('booking_date', in7).eq('status','confirmed').order('booking_date').order('slot_time');

  // Grupiši po datumu + resursu
  let html = resourceEditor + `<div style="display:flex;gap:8px;margin:14px 0;flex-wrap:wrap">
    ${resources.map(r => `<span style="padding:6px 12px;border-radius:999px;background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.25);font-size:10px;font-weight:900;color:#fcd34d">${esc(r.name)} (${r.total_qty} kom)</span>`).join('')}
  </div>`;

  if(!bookings?.length){
    html += '<div class="panel-card" style="text-align:center"><p style="font-size:13px;color:rgba(255,255,255,0.4);font-weight:700;margin:8px 0">Nema rezervacija u narednih 7 dana</p></div>';
  } else {
    const grouped = {};
    bookings.forEach(b => {
      if(!grouped[b.booking_date]) grouped[b.booking_date] = [];
      grouped[b.booking_date].push(b);
    });
    for(const [date, bks] of Object.entries(grouped)){
      const isToday = date === today;
      html += `<p style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:0.12em;color:${isToday?'#fbbf24':'rgba(255,255,255,0.4)'};margin:14px 0 8px">${isToday?'🔥 Danas':'📅'} ${date}</p>`;
      html += bks.map(b => {
        const res = resources.find(r => r.id === b.resource_id);
        return `<div class="booking-row">
          <div class="booking-time">${b.slot_time.slice(0,5)}</div>
          <div class="booking-info">
            <div style="font-weight:900;color:white">${esc(b.guest_name)}</div>
            <div style="color:rgba(255,255,255,0.5)">${esc(b.guest_phone)} · ${esc(res?.name||'')}</div>
          </div>
          <span class="booking-qty">${b.qty}</span>
          <button class="cancel-btn" onclick="cancelBooking('${b.id}', this)">✕</button>
        </div>`;
      }).join('');
    }
  }

  el.innerHTML = html;
}

async function cancelBooking(bookingId, btn){
  if(!confirm('Otkazati rezervaciju?')) return;
  await sb.from('bookings').update({status:'cancelled'}).eq('id', bookingId);
  btn.closest('.booking-row').remove();
}

async function saveResource(resId){
  const name = document.getElementById('res-name').value.trim() || 'Termin';
  const qty  = parseInt(document.getElementById('res-qty').value) || 10;
  const msgEl = document.getElementById('res-msg');

  if(resId){
    await sb.from('bookable_resources').update({name, total_qty:qty}).eq('id', resId);
  } else {
    await sb.from('bookable_resources').insert({partner_id:partner.id, name, total_qty:qty, is_active:true});
  }

  msgEl.style.color = '#6ee7b7';
  msgEl.textContent = '✓ Sačuvano!';
  setTimeout(() => { msgEl.textContent=''; renderBookings(); }, 1200);
}

// ── Events Tab ────────────────────────────────────────────────────
async function renderEvents(){
  const el = document.getElementById('tab-events');
  const today = new Date().toISOString().split('T')[0];
  const { data:events } = await sb.from('events').select('*').eq('partner_id', partner.id).gte('event_date', today).order('event_date').limit(10);

  let eventsHtml = '';
  if(events?.length){
    eventsHtml = events.map(e => `
      <div class="booking-row">
        <div style="flex:1">
          <div style="font-weight:900">${esc(e.title)}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.45)">${e.event_date} ${e.event_time?'u '+e.event_time.slice(0,5):''}</div>
        </div>
        <button class="cancel-btn" onclick="deleteEvent('${e.id}', this)">✕</button>
      </div>`).join('');
  } else {
    eventsHtml = '<p style="font-size:12px;color:rgba(255,255,255,0.35);font-weight:700">Nema najavljenih događaja.</p>';
  }

  el.innerHTML = `
    <div class="panel-card">${eventsHtml}</div>
    <div class="panel-card" style="margin-top:16px">
      <p class="panel-card-title">Dodaj novi događaj</p>
      <div class="field-group"><label class="field-label">Naziv</label><input class="field-input" id="ev-title" placeholder="npr. Živa muzika"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field-group"><label class="field-label">Datum</label><input type="date" class="field-input" id="ev-date" min="${today}"></div>
        <div class="field-group"><label class="field-label">Vreme</label><input type="time" class="field-input" id="ev-time"></div>
      </div>
      <div class="field-group"><label class="field-label">Lokacija</label><input class="field-input" id="ev-loc" placeholder="Gde se događa?"></div>
      <div class="field-group"><label class="field-label">Opis (opciono)</label><textarea class="field-input" id="ev-desc" placeholder="Kratak opis..."></textarea></div>
      <button class="btn-primary" onclick="addEvent()">+ Dodaj događaj</button>
      <p class="save-msg" id="ev-msg"></p>
    </div>`;
}

async function addEvent(){
  const title = document.getElementById('ev-title').value.trim();
  const date  = document.getElementById('ev-date').value;
  const time  = document.getElementById('ev-time').value;
  const loc   = document.getElementById('ev-loc').value.trim();
  const desc  = document.getElementById('ev-desc').value.trim();
  if(!title || !date){ document.getElementById('ev-msg').textContent = '⚠️ Naziv i datum su obavezni.'; return; }
  await sb.from('events').insert({partner_id: partner.id, title, event_date:date, event_time:time||null, location:loc||null, description:desc||null, is_active:true});
  document.getElementById('ev-msg').textContent = '✓ Događaj dodat!';
  setTimeout(() => renderEvents(), 1000);
}

async function deleteEvent(id, btn){
  if(!confirm('Obrisati događaj?')) return;
  await sb.from('events').delete().eq('id', id);
  btn.closest('.booking-row').remove();
}

// ── Stats Tab ─────────────────────────────────────────────────────
async function renderStats(){
  const el = document.getElementById('tab-stats');
  el.innerHTML = '<p style="text-align:center;padding:20px;color:rgba(255,255,255,0.4);font-weight:700;font-size:12px">Učitavanje...</p>';

  const from30 = new Date(Date.now() - 30*24*60*60*1000).toISOString();

  // Svi klikovi za ovog partnera u zadnjih 30 dana
  const { data: clicks } = await sb.from('analytics_clicks')
    .select('action,created_at')
    .eq('partner_id', partner.id)
    .gte('created_at', from30);

  const { count: refCount } = await sb.from('referral_clicks')
    .select('*', {count:'exact', head:true})
    .eq('partner_id', partner.id)
    .gte('created_at', from30);

  const { count: stampCount } = await sb.from('stamps')
    .select('*', {count:'exact', head:true})
    .eq('location_id', partner.id);

  // Agregacija po akciji
  const counts = { page_visit:0, hh_view:0, radar_view:0, events_view:0, attr_view:0, qr_scan:0, wa_click:0, instagram_share:0 };
  (clicks||[]).forEach(c=>{ if(counts[c.action]!==undefined) counts[c.action]++; });

  const isApartOrHotel = partner.type==='apartment' || partner.type==='hotel';
  const isRestaurant = partner.type==='restaurant';

  let html = `
    <div style="margin-bottom:6px"><p style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.35);margin:0">Poslednjih 30 dana</p></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div class="panel-card" style="text-align:center;margin-bottom:0">
        <p class="panel-card-title">👁 Pregledi profila</p>
        <p style="font-size:2rem;font-weight:900;color:#3b82f6;margin:0">${counts.page_visit}</p>
      </div>`;

  if(isRestaurant){
    html += `
      <div class="panel-card" style="text-align:center;margin-bottom:0">
        <p class="panel-card-title">🍹 Happy Hour pregledi</p>
        <p style="font-size:2rem;font-weight:900;color:#fb923c;margin:0">${counts.hh_view}</p>
      </div>`;
  } else {
    html += `
      <div class="panel-card" style="text-align:center;margin-bottom:0">
        <p class="panel-card-title">📡 Radar pregledi</p>
        <p style="font-size:2rem;font-weight:900;color:#a78bfa;margin:0">${counts.radar_view}</p>
      </div>`;
  }

  html += `</div>`;

  // Premium sekcija - referral i instagram
  if(partner.is_premium && isApartOrHotel){
    html += `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div class="panel-card" style="text-align:center;margin-bottom:0;border-color:rgba(16,185,129,0.20);background:rgba(16,185,129,0.04)">
        <p class="panel-card-title" style="color:#6ee7b7">🎁 Pozovi prijatelja</p>
        <p style="font-size:2rem;font-weight:900;color:#6ee7b7;margin:0">${refCount||0}</p>
        <p style="font-size:9px;color:rgba(255,255,255,0.35);font-weight:700;margin-top:2px">poziva poslato</p>
      </div>
      <div class="panel-card" style="text-align:center;margin-bottom:0;border-color:rgba(236,72,153,0.20);background:rgba(236,72,153,0.04)">
        <p class="panel-card-title" style="color:#f9a8d4">📸 Instagram Share</p>
        <p style="font-size:2rem;font-weight:900;color:#f9a8d4;margin:0">${counts.instagram_share}</p>
        <p style="font-size:9px;color:rgba(255,255,255,0.35);font-weight:700;margin-top:2px">deljenja</p>
      </div>
    </div>`;
  }

  // Loyalty pečati - samo premium apartman/hotel
  if(partner.is_premium && isApartOrHotel){
    html += `
    <div class="panel-card" style="text-align:center;margin-bottom:12px">
      <p class="panel-card-title">⭐ Loyalty pečati skupljeno</p>
      <p style="font-size:2rem;font-weight:900;color:#fbbf24;margin:0">${stampCount||0}</p>
    </div>`;
  }

  // Ostali tipovi - prikazi atrakcije/dogadjaji preglede
  if(partner.type==='attraction'){
    html += `
    <div class="panel-card" style="text-align:center;margin-bottom:12px">
      <p class="panel-card-title">🎡 Pregledi u Atrakcijama</p>
      <p style="font-size:2rem;font-weight:900;color:#34d399;margin:0">${counts.attr_view}</p>
    </div>`;
  }

  html += `
    <div class="panel-card" style="text-align:center;margin-bottom:12px">
      <p class="panel-card-title">🎉 Pregledi u Događajima</p>
      <p style="font-size:1.6rem;font-weight:900;color:#f87171;margin:0">${counts.events_view}</p>
    </div>

    <div class="panel-card" style="margin-bottom:12px">
      <p class="panel-card-title">Status naloga</p>
      <p style="font-size:1rem;font-weight:900;color:${partner.is_active?'#6ee7b7':'#fca5a5'};margin:0">${partner.is_active?'✓ Aktivan':'✕ Suspendovan'}</p>
      ${partner.is_premium ? '<p style="font-size:10px;font-weight:800;color:#fbbf24;margin-top:6px">⭐ Premium partner</p>' : ''}
    </div>

    <div class="panel-card">
      <p class="panel-card-title">Moj partner URL</p>
      <div style="padding:10px 12px;background:rgba(0,0,0,0.3);border-radius:10px;font-family:monospace;font-size:10px;color:rgba(255,255,255,0.5);word-break:break-all">${location.href}</div>
    </div>`;

  el.innerHTML = html;
}

function esc(s){ return C.escapeHtml(s); }

// ── Boot ──────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  const guard = StayVBGuard.requirePartner();
  if(!guard) return;

  // Uvek prikaži PIN screen kao default
  document.getElementById('pin-screen').classList.remove('hidden');
  document.getElementById('main-app').classList.add('hidden');

  // Ako postoji validna sesija — auto-login
  const saved = C.getPartnerSession();
  if(saved && saved.token === guard && saved.name){
    partner = saved;
    document.getElementById('pin-screen').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    initApp();
  }
});
</script>
